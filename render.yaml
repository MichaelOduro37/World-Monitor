services:
  # ── Backend API ────────────────────────────────────────────────────────────────
  - type: web
    name: world-monitor-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Render injects $PORT; alembic runs migrations before server starts.
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: world-monitor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: world-monitor-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # Set to your web frontend URL after first deploy, e.g.:
      #   https://world-monitor-web.onrender.com
      - key: CORS_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@worldmonitor.example.com
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        value: admin@worldmonitor.example.com
      - key: INGESTION_INTERVAL_SECONDS
        value: "300"

  # ── Celery Worker + Beat Scheduler ────────────────────────────────────────────
  - type: worker
    name: world-monitor-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.workers.celery_app worker --beat --loglevel=info
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: world-monitor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: world-monitor-redis
          property: connectionString
      # Copy this value from world-monitor-api → Environment → SECRET_KEY
      - key: SECRET_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@worldmonitor.example.com
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_CLAIMS_EMAIL
        value: admin@worldmonitor.example.com
      - key: INGESTION_INTERVAL_SECONDS
        value: "300"

  # ── React Web Dashboard (Static Site) ─────────────────────────────────────────
  - type: web
    name: world-monitor-web
    runtime: static
    rootDir: web
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set to your API service URL after first deploy, then redeploy this service.
      # Example: https://world-monitor-api.onrender.com/api/v1
      - key: VITE_API_URL
        sync: false

  # ── Redis ──────────────────────────────────────────────────────────────────────
  - type: redis
    name: world-monitor-redis
    plan: free
    maxmemoryPolicy: noeviction

# ── Managed PostgreSQL ─────────────────────────────────────────────────────────
databases:
  - name: world-monitor-db
    databaseName: worldmonitor
    user: worldmonitor
    plan: free

# Railway configuration for the World Monitor backend API.
# Additional services (worker, web) are configured via the Railway dashboard.
# See DEPLOY.md for full deployment instructions.

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "backend/Dockerfile"
  dockerContext = "backend"

[deploy]
  # Railway injects $PORT automatically.
  startCommand = "sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
  healthcheckPath = "/health"
  healthcheckTimeout = 300
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

version: '3.9'

# Production docker-compose for self-hosted VPS deployments.
# Usage:
#   cp .env.production.example .env.production
#   # edit .env.production with real values
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# See DEPLOY.md for full instructions.

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worldmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-worldmonitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worldmonitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-worldmonitor}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env.production}
      APP_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@worldmonitor.example.com}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL:-admin@worldmonitor.example.com}
      INGESTION_INTERVAL_SECONDS: ${INGESTION_INTERVAL_SECONDS:-300}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-worldmonitor}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-worldmonitor}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      APP_ENV: production
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@worldmonitor.example.com}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL:-admin@worldmonitor.example.com}
      INGESTION_INTERVAL_SECONDS: ${INGESTION_INTERVAL_SECONDS:-300}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --beat --loglevel=info

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # When using VPS + nginx-proxy setup, the default /api/v1 relative path
        # is fine because nginx proxies /api/ to the backend container.
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

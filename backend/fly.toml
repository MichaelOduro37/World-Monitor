# Fly.io configuration for the World Monitor backend API.
# Deploy from the backend/ directory: cd backend && fly deploy
# See DEPLOY.md for full deployment instructions.

app = "world-monitor-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "alembic upgrade head"
